<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#010a1a">
  <title>JARVIS // OFFLINE</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 4px rgba(0, 212, 255, 0.25), inset 0 0 4px rgba(0, 212, 255, 0.05); }
      50% { box-shadow: 0 0 18px rgba(0, 212, 255, 0.5), inset 0 0 10px rgba(0, 212, 255, 0.08); }
    }

    body {
      background: #010a1a;
      color: #00d4ff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    .card {
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 3px;
      padding: 40px 48px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      animation: pulse-border 3s ease-in-out infinite;
      position: relative;
    }

    .corner { position: absolute; width: 14px; height: 14px; border-color: #00d4ff; border-style: solid; opacity: 0.5; }
    .tl { top: 6px; left: 6px; border-width: 2px 0 0 2px; }
    .tr { top: 6px; right: 6px; border-width: 2px 2px 0 0; }
    .bl { bottom: 6px; left: 6px; border-width: 0 0 2px 2px; }
    .br { bottom: 6px; right: 6px; border-width: 0 2px 2px 0; }

    .title {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 10px;
      text-shadow: 0 0 12px #00d4ff, 0 0 24px rgba(0, 212, 255, 0.4);
      margin-bottom: 28px;
    }

    .status-line {
      font-size: 11px;
      letter-spacing: 3px;
      color: #ff4444;
      text-shadow: 0 0 8px rgba(255, 68, 68, 0.6);
      animation: blink 1.4s ease-in-out infinite;
      margin-bottom: 24px;
    }

    .divider {
      border: none;
      border-top: 1px solid rgba(0, 212, 255, 0.15);
      margin: 20px 0;
    }

    .message-main {
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .message-sub {
      font-size: 10px;
      letter-spacing: 1.5px;
      color: rgba(0, 212, 255, 0.55);
      margin-bottom: 20px;
    }

    .auto-note {
      font-size: 9px;
      letter-spacing: 1px;
      color: rgba(0, 212, 255, 0.35);
      margin-bottom: 24px;
      line-height: 1.7;
    }

    .checklist {
      list-style: none;
      text-align: left;
      font-size: 9px;
      letter-spacing: 1px;
      color: rgba(0, 212, 255, 0.45);
      line-height: 2;
    }

    .checklist li::before { content: '* '; }
  </style>
</head>
<body>
  <div class="card">
    <span class="corner tl"></span>
    <span class="corner tr"></span>
    <span class="corner bl"></span>
    <span class="corner br"></span>

    <div class="title">J . A . R . V . I . S</div>

    <div class="status-line">// CONNECTION LOST</div>

    <div class="message-main">NO NETWORK AVAILABLE</div>
    <div class="message-sub">Telemetry feed suspended</div>

    <div class="auto-note">
      Reconnect will be attempted automatically<br>
      when network is restored
    </div>

    <hr class="divider">

    <ul class="checklist">
      <li>Check your internet connection</li>
      <li>The bridge may be offline</li>
    </ul>
  </div>
</body>
</html>
